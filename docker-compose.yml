services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_apartment
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: smart_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U smart_user -d smart_apartment" ]
      interval: 5s
      timeout: 5s
      retries: 5

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    volumes:
      - ./:/work
    ports:
      - "8001:8000"
    command: ["mkdocs","serve","--dev-addr=0.0.0.0:8000"]

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm","run","dev","--","--host","0.0.0.0","--port","5173"]
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
